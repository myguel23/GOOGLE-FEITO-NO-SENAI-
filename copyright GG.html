<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico" />
</head>
<body>
    <!-- === NAVBAR === -->
    <header class="navbar">
        <div class="nav-left">
            <a href="#">Sobre</a>
            <a href="#">Produtos</a>
        </div>
        <div class="nav-right">
            <a href="#">Gmail</a>
            <a href="#">Imagens</a>
            <div class="menu-icon">
                <span></span><span></span><span></span>
            </div>
            <button class="signin-btn">Fazer login</button>
        </div>
    </header>

    <!-- === MAIN CONTENT === -->
    <main class="main-content">
        <div class="logo">
            <img
                src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
                alt="Google Logo"
            />
        </div>

        <!-- Search Box -->
        <div class="search-container">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" autofocus />
                <div class="search-actions">
                    <span class="mic-icon" id="micIcon" title="Pesquisa por voz">🎤</span>
                    <span class="camera-icon" title="Pesquisa por imagem">📷</span>
                </div>
            </div>
            <div class="search-buttons">
                <button class="btn" id="searchBtn">Pesquisa Google</button>
                <button class="btn" id="luckyBtn">Estou com sorte</button>
            </div>
            <p class="language-offer">
                Disponibilizado em:
                <a href="#">English</a>
                <a href="#">Français</a>
                <a href="#">Español</a>
            </p>
        </div>
    </main>

    <!-- === FOOTER === -->
    <footer class="footer">
        <div class="footer-line footer-country">
            <span>Brasil</span>
        </div>
        <div class="footer-line footer-links">
            <div class="footer-left">
                <a href="#">Publicidade</a>
                <a href="#">Negócios</a>
                <a href="#">Como funciona a Pesquisa</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacidade</a>
                <a href="#">Termos</a>
                <a href="#">Configurações</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
